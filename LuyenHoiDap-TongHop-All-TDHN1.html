<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Luyện Hỏi Đáp Tiếng Trung - Toàn Bộ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
        
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
        
        .answer-box {
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes popIn {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .tab-active {
            background-color: white;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-zinc-100 min-h-screen pb-12">

    <div class="max-w-2xl mx-auto px-4 pt-8">
        
        <!-- Header -->
        <div class="flex items-center justify-center gap-3 mb-8">
            <div class="w-20 h-20 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-3xl flex items-center justify-center text-6xl shadow-xl">🎯</div>
            <div>
                <h1 class="text-4xl font-bold text-gray-900">Luyện Hỏi Đáp Tiếng Trung</h1>
                <p class="text-violet-600 text-xl -mt-1">Toàn bộ 4 phần - Học vui vẻ 📱</p>
            </div>
        </div>

        <!-- Tab chọn phần -->
        <div class="flex flex-wrap gap-2 mb-8 bg-white p-2 rounded-3xl shadow-sm">
            <button onclick="showPart(1)" id="tab1" 
                    class="tab-active flex-1 py-4 rounded-3xl font-bold text-lg transition-all">Bài 1-4</button>
            <button onclick="showPart(2)" id="tab2" 
                    class="flex-1 py-4 rounded-3xl font-bold text-lg transition-all">Bài 5-8</button>
            <button onclick="showPart(3)" id="tab3" 
                    class="flex-1 py-4 rounded-3xl font-bold text-lg transition-all">Bài 9-12</button>
            <button onclick="showPart(4)" id="tab4" 
                    class="flex-1 py-4 rounded-3xl font-bold text-lg transition-all">Bài 13-16</button>
        </div>

        <!-- Nội dung các phần -->
        <div id="content" class="bg-white rounded-3xl shadow-xl p-6 min-h-[500px]"></div>

    </div>

    <script>
        // ================== DỮ LIỆU TẤT CẢ CÂU HỎI ==================
        const allQuestions = {
            1: [  // Bài 1-4
                {id:1, q:"你叫什麽名字？", vn:"Bạn tên gì?", emoji:"👤", template:"我叫 {val}。", opts:["Anna 👧","Kevin 👦","John 👨","Kim 🧑","Nguyen 👤"]},
                {id:2, q:"你是哪國人？", vn:"Bạn là người nước nào?", emoji:"🌍", template:"我是 {val} 人。", opts:["Vietnam 🇻🇳","TQ 🇨🇳","Nhat Ban 🇯🇵","Mỹ 🇺🇸","Anh 🇬🇧"]},
                {id:3, q:"現在幾點？", vn:"Bây giờ mấy giờ?", emoji:"⏰", template:"現在是 {val}。", opts:["10h 🕙","2h30 🕝","5h40 🕠","6h 15 🕡","22h10 🕚"]},
                {id:4, q:"今天星期幾？", vn:"Hôm nay thứ mấy?", emoji:"📅", template:"今天是 {val}。", opts:["Monday 📅","Tuesday 📅","Wednesday 📅","Thursday 📅","Friday 📅","Saturday 📅","Sunday 📅"]},
                {id:5, q:"你想送什麽？", vn:"Bạn muốn tặng gì?", emoji:"🎁", template:"我想送 {val}。", opts:["hoa 🌹","sách 📖","viết ✏️","tiền 💵","quần áo 👕"]},
                {id:6, q:"那是什麽顔色？", vn:"Đó là màu gì?", emoji:"🎨", template:"那是 {val}。", opts:["Red 🔴","White ⚪","Black ⚫","yellow 🟡","blue 🔵"]},
                {id:7, q:"天氣怎麽樣？", vn:"Thời tiết thế nào?", emoji:"🌤️", template:"天氣 {val}。", opts:["mưa 🌧️","tốt ☀️","không tốt ☁️","nóng 🔥","lạnh ❄️"]},
                {id:8, q:"一共多少錢？", vn:"Tổng cộng bao nhiêu tiền?", emoji:"💰", template:"一共 {val} 錢。", opts:["10000 💵","33000 💵","500 💵","6000 💵","3000000 🪙"]}
            ],
            2: [  // Bài 5-8
                {id:1, q:"你在哪裡？", vn:"Bạn đang ở đâu?", emoji:"📍", template:"我在 {val}。", opts:["nhà 🏠","quán cf ☕","thư viện 📚","trường học 🏫"]},
                {id:2, q:"學校裡面有什麽", vn:"Trong trường có gì?", emoji:"🏫", template:"學校裡面有 {val}。", opts:["100 học sinh 👦👧","15 giáo viên 👩‍🏫","12 con chó 🐶","4 con mèo 🐱"]},
                {id:3, q:"你會做什麽？", vn:"Bạn biết làm gì?", emoji:"🏅", template:"我會 {val}。", opts:["biết bơi 🏊","biết đánh bóng chày ⚾","biết đá bóng ⚽"]},
                {id:4, q:"在學校可以做什麽？", vn:"Ở trường có thể làm gì?", emoji:"📖", template:"在學校可以 {val}。", opts:["có thể đọc sách 📚","có thể nghe nhạc 🎵","có thể chạy bộ 🏃"]},
                {id:5, q:"你從你家到學校怎麽去？", vn:"Từ nhà đến trường bạn đi bằng gì?", emoji:"🛤️", template:"我 {val} 去學校。", opts:["xe hơi 🚗","xe đạp 🚲","đi bộ 🚶","xe buýt 🚌"]},
                {id:6, q:"你覺得這東西怎麽樣？", vn:"Bạn thấy thứ này thế nào?", emoji:"👍", template:"我覺得 {val}。", opts:["mì 又 rẻ又 ngon 🍜","trà 又 rẻ又 ngon 🍵","quần áo 又 rẻ又 đẹp 👕"]},
                {id:7, q:"為什麽你買這東西？", vn:"Tại sao bạn mua thứ này?", emoji:"❓", template:"因為 {val}。", opts:["quần áo (vì tôi thích) 👕","hoa (vì tôi muốn tặng mẹ) 🌹","sách (vì thích học tiếng trung) 📖"]},
                {id:8, q:"這個怎麽樣？", vn:"Cái này thế nào?", emoji:"🤔", template:"這個 {val}。", opts:["bài hát khó hát 🎤","tiếng Trung khó học 🀄","xe đạp khó đạp 🚲"]}
            ],
            3: [  // Bài 9-12
                {id:1, q:"你在做什麽？", vn:"Bạn đang làm gì?", emoji:"🤔", template:"我在 {val}。", opts:["xem TV 📺","viết tiếng Trung ✍️","hát 🎤","nhảy múa 💃"]},
                {id:2, q:"爲什麽我們不能説話？", vn:"Tại sao chúng ta không được nói chuyện?", emoji:"🤫", template:"因為 {val}。", opts:["đây là thư viện 📚","họ đang ngủ 😴","giáo viên nói không được 👩‍🏫","đây là tàu MRT 🚄"]},
                {id:3, q:"這是怎麽樣的飯", vn:"Đây là cơm do ai làm?", emoji:"🍚", template:"這是 {val} 的飯。", opts:["bố mua 👨","tôi làm 👩‍🍳","mẹ làm 👩‍🍳","bạn bè mua 👥"]},
                {id:4, q:"明天你會做什麽？", vn:"Ngày mai bạn sẽ làm gì?", emoji:"📅", template:"明天我會 {val}。", opts:["sẽ đi du lịch 🏖️","sẽ đi bơi 🏊","sẽ đi xem bóng ⚽","sẽ đi khám bệnh 🩺"]},
                {id:5, q:"昨天，你已經做了什麽？", vn:"Hôm qua bạn đã làm gì?", emoji:"📆", template:"昨天我已經 {val}。", opts:["ăn mì thịt bò 🍜","nghe nhạc 🎧","xem sách 📖","học tiếng trung 🀄"]},
                {id:6, q:"這是怎麽樣買的？", vn:"Cái này mua như thế nào?", emoji:"🛍️", template:"這是 {val}。", opts:["hôm qua đi trung tâm thương mại mua 🏬","bố mua tặng 👨","mẹ mua tặng 👩","lên mạng mua 💻"]},
                {id:7, q:"你喜歡做什麽？", vn:"Bạn thích làm gì?", emoji:"❤️", template:"我喜歡 {val}。", opts:["dùng tiếng trung viết thư ✉️","dùng điện thoại gọi mẹ 📱","dùng tiền mua đồ 💰","dùng bút chì vẽ ✏️"]},
                {id:8, q:"你去過哪裡？", vn:"Bạn đã đi qua đâu?", emoji:"✈️", template:"我去過 {val}。", opts:["đi qua Trung Quốc 🇨🇳","đi qua Hàn Quốc 🇰🇷","đi qua Đài Loan 🇹🇼","đi qua Nhật Bản 🇯🇵"]}
            ],
            4: [  // Bài 13-16
                {id:1, q:"爲什麽你開心？", vn:"Tại sao bạn vui?", emoji:"😄", template:"因為 {val}。", opts:["7h就 thức dậy 🌅","6h ăn cơm 🍚","10h就 đi ngủ 😴","11h làm bài tập 📝"]},
                {id:2, q:"什麽就要發生了？", vn:"Chuyện gì sắp xảy ra?", emoji:"⏰", template:"{val}。", opts:["tôi về nước ✈️","xe lửa sắp đến 🚄","mẹ sắp về nhà 🏠","sắp thi 📚"]},
                {id:3, q:"昨天你做了什麽？", vn:"Hôm qua bạn làm gì?", emoji:"📆", template:"昨天我 {val}。", opts:["hát 2 tiếng 🎤","ngủ 8 tiếng 😴","ăn 1 tiếng 🍜","xem TV 4 tiếng 📺"]},
                {id:4, q:"今天比昨天怎麽樣？", vn:"Hôm nay so với hôm qua thế nào?", emoji:"📊", template:"{val}。", opts:["hôm nay lạnh hơn hôm qua ❄️","hôm nay nóng hơn hôm qua 🔥","tôi hôm nay mệt hơn hôm qua 😩","thịt bò hôm nay mắc hơn hôm qua 💰"]},
                {id:5, q:"這部電影，你覺得怎麽樣？", vn:"Bộ phim này bạn thấy thế nào?", emoji:"🎥", template:"我覺得 {val}。", opts:["xem cái là thích 👍","xem cái là không muốn xem 👎","xem cái là cười 😂","xem cái là vui 😊"]},
                {id:6, q:"那是什麽？", vn:"Đó là gì?", emoji:"👀", template:"{val}。", opts:["cửa đang mở 🚪","anh ấy đang mặc đồ đỏ 👕","trên bàn đang để sữa 🥛","trên xe có người ngồi 🚌"]},
                {id:7, q:"你和他怎麽樣？", vn:"Bạn và anh ấy so sánh thế nào?", emoji:"👥", template:"{val}。", opts:["tôi không nhanh như anh ấy 🏃","tôi không chậm như anh ấy 🐢","tôi không thông minh như anh ấy 🧠","tôi không dễ thương như anh ấy 🥰"]},
                {id:8, q:"原來怎麽樣，後來怎麽樣？", vn:"Ban đầu thế nào, sau đó thế nào?", emoji:"🔄", template:"原來 {val}。", opts:["vốn dĩ tôi không thích mèo sau đó mua 1 con mèo 🐱","vốn dĩ tôi thích chó sau đó tôi thích mèo 🐶","vốn dĩ tôi định mua thịt bò sau đó mua cơm 🍖","vốn dĩ tôi định đi Trung Quốc sau đó quyết định đi Đài Loan 🇹🇼"]}
            ]
        };

        let currentPart = 1;
        let currentQ = null;

        function showPart(part) {
            currentPart = part;
            // Cập nhật tab active
            for (let i = 1; i <= 4; i++) {
                const tab = document.getElementById(`tab${i}`);
                if (tab) tab.classList.toggle('tab-active', i === part);
            }
            renderQuestionList();
        }

        function renderQuestionList() {
            const questions = allQuestions[currentPart];
            let html = `
                <div class="mb-6">
                    <p class="text-center text-violet-700 font-medium mb-4">Chọn câu hỏi 👇 (Phần ${currentPart})</p>
                    <div class="grid grid-cols-4 gap-3">`;

            questions.forEach(q => {
                html += `
                    <div onclick="selectQuestion(${q.id})" 
                         class="aspect-square bg-white rounded-3xl flex flex-col items-center justify-center shadow-md border-4 border-transparent hover:border-violet-400 active:scale-95 transition-all cursor-pointer">
                        <div class="text-5xl mb-1">${q.emoji}</div>
                        <div class="text-3xl font-bold text-violet-600">${q.id}</div>
                    </div>`;
            });

            html += `</div></div>`;
            document.getElementById('content').innerHTML = html;
        }

        function selectQuestion(id) {
            const questions = allQuestions[currentPart];
            currentQ = questions.find(q => q.id === id);
            if (currentQ) randomizeAnswer();
        }

        function randomizeAnswer() {
            if (!currentQ) return;
            
            const randomIndex = Math.floor(Math.random() * currentQ.opts.length);
            const selected = currentQ.opts[randomIndex];
            const parts = selected.split(' ');
            const val = parts.slice(0, -1).join(' ');
            const em = parts[parts.length - 1];
            
            const fullAnswer = currentQ.template.replace('{val}', val);

            const html = `
                <div class="text-center">
                    <div class="flex justify-center mb-6">
                        <div class="text-7xl">${currentQ.emoji}</div>
                    </div>
                    
                    <div class="text-3xl font-bold text-gray-800 mb-2">${currentQ.q}</div>
                    <div class="text-lg text-violet-600 mb-8">(${currentQ.vn})</div>

                    <div class="answer-box bg-gradient-to-br from-violet-50 to-fuchsia-50 rounded-3xl py-10 px-6 border-4 border-violet-200">
                        <div class="text-violet-500 text-xs font-medium tracking-widest mb-4">📱 ĐÁP ÁN CHO BẠN B</div>
                        
                        <div class="flex items-center justify-center gap-4 mb-8">
                            <span class="text-6xl">${em}</span>
                            <span class="text-5xl font-black text-gray-900">${val}</span>
                        </div>
                        
                        <div class="bg-white mx-auto max-w-[300px] rounded-2xl py-5 px-6 shadow-inner">
                            <div class="text-emerald-600 text-xs mb-2">💬 Câu trả lời đầy đủ:</div>
                            <div class="text-2xl font-medium text-gray-800 leading-tight">${fullAnswer}</div>
                        </div>
                    </div>

                    <button onclick="randomizeAnswer()" 
                            class="mt-10 w-full bg-gradient-to-r from-violet-500 to-fuchsia-500 text-white font-bold text-3xl py-7 rounded-3xl shadow-lg active:scale-95">
                        🎲 Đáp án mới
                    </button>
                    
                    <button onclick="renderQuestionList()" 
                            class="mt-4 w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-4 rounded-3xl transition-colors">
                        ← Quay lại chọn câu hỏi
                    </button>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        }

        // Khởi động
        window.onload = () => {
            showPart(1);
        };
    </script>
</body>
</html>
