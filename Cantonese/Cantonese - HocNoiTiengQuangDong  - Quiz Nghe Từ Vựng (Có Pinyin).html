        let currentLesson = null;
        let currentMode = null;

        let currentIndex = 0;
        let isAnswered = false;
        let currentHanzi = "";
        let currentPinyin = "";

            function createLessonButtons() {
                const container = document.getElementById('lesson-list');
                container.innerHTML = '';
                
                // Tự động quét toàn bộ các số bài đang có trong dữ liệu allLessons
                const lessonNumbers = Object.keys(allLessons).map(Number).sort((a, b) => a - b);
                
                lessonNumbers.forEach(i => {
                    const btn = document.createElement('button');
                    btn.textContent = `Bài ${i}`;
                    btn.onclick = () => selectLesson(i);
                    container.appendChild(btn);
                });
            }

        function selectLesson(lessonNum) {
            currentLesson = lessonNum;
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('mode-screen').style.display = 'block';
            document.getElementById('selected-lesson-title').textContent = `Bài ${lessonNum} - Chọn dạng quiz`;
        }

        function backToMenu() {
            document.getElementById('mode-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'block';
        }

        function startQuiz(mode) {
            currentMode = mode;
            const lessonData = allLessons[currentLesson];
            
            vocabulary = lessonData.normal.map(hanzi => ({
                hanzi: hanzi,
                pinyin: lessonData.items[hanzi].pinyin,
                meaning: lessonData.items[hanzi].meaning
            }));

            if (mode === 'shuffle') {
                vocabulary = vocabulary.sort(() => Math.random() - 0.5);
            }

            currentIndex = 0;
            document.getElementById('mode-screen').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            
            document.getElementById('lesson-num').textContent = currentLesson;
            document.getElementById('total').textContent = vocabulary.length;
            
            loadQuestion();
        }

        function loadQuestion() {
            isAnswered = false;
            const currentWord = vocabulary[currentIndex];
            currentHanzi = currentWord.hanzi;
            currentPinyin = currentWord.pinyin;

            document.getElementById('current').textContent = currentIndex + 1;
            document.getElementById('hanzi').textContent = currentHanzi;
            document.getElementById('pinyin').textContent = currentPinyin;
            document.getElementById('hanzi').classList.remove('show');
            document.getElementById('pinyin').style.display = 'none';
            document.getElementById('result').textContent = '';

            setTimeout(() => speakCurrent(), 400);

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            let wrongAnswers = vocabulary.filter(w => w.hanzi !== currentHanzi);
            wrongAnswers = wrongAnswers.sort(() => Math.random() - 0.5).slice(0, 3);
            
            let answers = [currentWord.meaning, ...wrongAnswers.map(w => w.meaning)];
            answers = answers.sort(() => Math.random() - 0.5);

            answers.forEach(answer => {
                const btn = document.createElement('button');
                btn.textContent = answer;
                btn.onclick = () => checkAnswer(answer, currentWord.meaning, btn);
                optionsDiv.appendChild(btn);
            });
        }

        function speakCurrent() {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(currentHanzi);
                utterance.lang = 'zh-HK';
                utterance.rate = 0.75;
                speechSynthesis.speak(utterance);
            }
        }

        function toggleHanzi() {
            const hanziEl = document.getElementById('hanzi');
            const pinyinEl = document.getElementById('pinyin');
            hanziEl.classList.toggle('show');
            pinyinEl.style.display = hanziEl.classList.contains('show') ? 'block' : 'none';
        }

        function checkAnswer(selected, correct, button) {
            if (isAnswered) return;
            isAnswered = true;

            const buttons = document.querySelectorAll('#options button');
            buttons.forEach(btn => {
                if (btn.textContent === correct) btn.classList.add('correct');
                else if (btn.textContent === selected && selected !== correct) btn.classList.add('wrong');
                btn.disabled = true;
            });

            const resultDiv = document.getElementById('result');
            if (selected === correct) {
                resultDiv.textContent = "✓ Đúng rồi!";
                resultDiv.style.color = "#4ade80";
                setTimeout(() => {
                    currentIndex++;
                    if (currentIndex < vocabulary.length) loadQuestion();
                    else finishQuiz();
                }, 1400);
            } else {
                resultDiv.textContent = "✕ Sai rồi! Quay lại đầu chặng (5 từ).";
                resultDiv.style.color = "#f87171";
                
                const stageSize = 5;
                const currentStageStart = Math.floor(currentIndex / stageSize) * stageSize;
                currentIndex = currentStageStart;
                
                setTimeout(() => loadQuestion(), 2200);
            }
        }

        function finishQuiz() {
            document.getElementById('hanzi').innerHTML = `<div style="font-size: 60px;">🎉 Hoàn thành!</div>`;
            document.getElementById('options').innerHTML = `
                <button onclick="restartCurrentQuiz()" style="width:100%; padding:25px; font-size:24px; background:#4ade80; color:white;">
                    Chơi lại bài này
                </button>`;
        }

        function restartCurrentQuiz() {
            currentIndex = 0;
            if (currentMode === 'shuffle') vocabulary.sort(() => Math.random() - 0.5);
            loadQuestion();
        }

        function exitQuiz() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'block';
        }

        window.onload = () => {
            createLessonButtons();
        };
    </script>


</body></html>
