<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Chameleon - Kế Hoạch Tương Lai</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #e0f2e9, #f0f8f0);
      margin: 0;
      padding: 0;
      color: #333;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; color: #2e7d32; }
    .screen { display: none; }
    .active { display: block; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 30px auto;
    }
    .cell {
      background: white;
      border: 3px solid #4caf50;
      border-radius: 12px;
      padding: 18px;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 1.05em;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .cell:hover { transform: scale(1.05); }
    .cell.strikethrough {
      text-decoration: line-through;
      background: #ffebee;
      color: #d32f2f;
      border-color: #d32f2f;
    }
    .cell.keyword {
      background: #c8e6c9;
      border-color: #2e7d32;
      font-weight: bold;
    }

    button {
      padding: 12px 24px;
      font-size: 1.1em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 8px;
    }
    .btn-green { background: #4caf50; color: white; }
    .btn-red { background: #f44336; color: white; }
    .btn-blue { background: #2196f3; color: white; }

    .player-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 20px 0;
    }
    .player {
      background: white;
      padding: 10px 16px;
      border-radius: 50px;
      border: 2px solid #4caf50;
    }
    .chameleon { border-color: #ff9800; background: #fff3e0; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Màn hình chính -->
    <div id="menu-screen" class="screen active">
      <h1>🐪 The Chameleon</h1>
      <h2>Kế Hoạch Tương Lai</h2>
      <br><br>
      <button class="btn-green" onclick="createRoom()">Tạo Phòng Mới</button>
      <br>
      <input type="text" id="room-id-input" placeholder="Nhập Room ID" style="padding:12px; width:200px; font-size:1.1em;">
      <button class="btn-blue" onclick="joinRoom()">Vào Phòng</button>
    </div>

    <!-- Lobby -->
    <div id="lobby-screen" class="screen">
      <h2>Phòng: <span id="room-id-display"></span></h2>
      <p>Người chơi (<span id="player-count">1</span>/8)</p>
      
      <div class="player-list" id="player-list"></div>

      <button class="btn-green" onclick="startGame()" id="start-btn">Bắt Đầu Game</button>
      <button class="btn-red" onclick="backToMenu()">Thoát Phòng</button>
    </div>

    <!-- Màn hình chơi -->
    <div id="game-screen" class="screen">
      <h2>Phòng: <span id="room-id-game"></span></h2>
      
      <div id="role-info" style="font-size:1.4em; margin:20px 0;"></div>
      
      <div class="grid" id="game-board"></div>

      <div style="margin:20px 0;">
        <button class="btn-red" onclick="endRound()">Kết thúc vòng</button>
      </div>
    </div>
  </div>

  <script>
    // Dữ liệu bảng
    const boardData = [
      ["Du học nước ngoài", "Lập gia đình", "Mua nhà riêng", "Khởi nghiệp"],
      ["Thăng tiến sự nghiệp", "Du lịch vòng quanh thế giới", "Sinh con", "Chuyển việc"],
      ["Tiết kiệm & Đầu tư", "Sống ở nước ngoài", "Học thêm kỹ năng mới", "Viết sách / Xuất bản"],
      ["Tập gym & Sức khỏe", "Học ngôn ngữ mới", "Nghỉ hưu sớm", "Mở quán cà phê / Nhà hàng"]
    ];

    let currentRoomId = "";
    let isHost = false;
    let players = [];
    let myRole = ""; // "chameleon" hoặc "normal"
    let secretWord = "";
    let isChameleon = false;

    // Tạo phòng
    function createRoom() {
      currentRoomId = "ROOM" + Math.floor(1000 + Math.random() * 9000);
      isHost = true;
      players = ["Bạn (Host)"];
      enterLobby();
    }

    // Vào phòng
    function joinRoom() {
      const input = document.getElementById("room-id-input").value.trim();
      if (input === "") {
        alert("Vui lòng nhập Room ID!");
        return;
      }
      currentRoomId = input.toUpperCase();
      isHost = false;
      players = ["Người chơi 1", "Bạn", "Người chơi 3", "Người chơi 4"];
      enterLobby();
    }

    function enterLobby() {
      document.getElementById("menu-screen").classList.remove("active");
      document.getElementById("lobby-screen").classList.add("active");
      
      document.getElementById("room-id-display").textContent = currentRoomId;
      updatePlayerList();
    }

    function updatePlayerList() {
      const list = document.getElementById("player-list");
      list.innerHTML = "";
      players.forEach(p => {
        const div = document.createElement("div");
        div.className = "player";
        div.textContent = p;
        list.appendChild(div);
      });
      document.getElementById("player-count").textContent = players.length;
    }

    // Bắt đầu game
    function startGame() {
      if (!isHost) {
        alert("Chỉ Host mới được bắt đầu game!");
        return;
      }

      // Random Chameleon
      const chameleonIndex = Math.floor(Math.random() * players.length);
      
      // Random keyword
      const allWords = boardData.flat();
      secretWord = allWords[Math.floor(Math.random() * allWords.length)];

      // Giả lập role cho bạn
      isChameleon = Math.random() < 0.25; // 25% là Chameleon
      myRole = isChameleon ? "chameleon" : "normal";

      document.getElementById("lobby-screen").classList.remove("active");
      document.getElementById("game-screen").classList.add("active");
      document.getElementById("room-id-game").textContent = currentRoomId;

      renderRoleInfo();
      renderBoard();
    }

    function renderRoleInfo() {
      const info = document.getElementById("role-info");
      if (isChameleon) {
        info.innerHTML = `<span style="color:#ff9800; font-weight:bold;">Bạn là CHAMELEON 🦎</span><br>Đừng để bị phát hiện!`;
      } else {
        info.innerHTML = `Từ khóa: <span style="color:#2e7d32; font-weight:bold;">${secretWord}</span>`;
      }
    }

    function renderBoard() {
      const grid = document.getElementById("game-board");
      grid.innerHTML = "";

      boardData.flat().forEach(text => {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.textContent = text;

        if (!isChameleon && text === secretWord) {
          cell.classList.add("keyword");
        }

        cell.onclick = () => {
          cell.classList.toggle("strikethrough");
        };

        grid.appendChild(cell);
      });
    }

    function endRound() {
      if (confirm("Kết thúc vòng này?")) {
        alert("Vòng chơi đã kết thúc! (Bạn có thể refresh để chơi lại)");
        location.reload();
      }
    }

    function backToMenu() {
      location.reload();
    }

    // Khởi tạo
    window.onload = () => {
      // Có thể thêm gì đó ở đây nếu cần
    };
  </script>
</body>
</html>
