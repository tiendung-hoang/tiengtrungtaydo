<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎯 Luyện Hỏi Đáp Tiếng Trung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
        
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
        
        .answer-box {
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes popIn {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-amber-50 to-yellow-100 min-h-screen pb-12">

    <div class="max-w-xl mx-auto px-4 pt-8">
        
        <!-- Header -->
        <div class="flex items-center justify-center gap-3 mb-8">
            <div class="w-16 h-16 bg-yellow-400 rounded-3xl flex items-center justify-center text-5xl shadow-md">🎯</div>
            <div>
                <h1 class="text-4xl font-bold text-gray-900">Luyện Hỏi Đáp</h1>
                <p class="text-amber-600 text-lg -mt-1">Tiếng Trung vui vẻ 📱</p>
            </div>
        </div>

        <!-- Chọn câu hỏi -->
        <div class="mb-8">
            <p class="text-center text-amber-700 font-medium mb-4">Chọn câu hỏi 👇</p>
            <div id="question-list" class="grid grid-cols-4 gap-3"></div>
        </div>

        <!-- Khu vực hiển thị đáp án -->
        <div id="main-content" class="bg-white rounded-3xl shadow-xl p-8 min-h-[420px]"></div>

    </div>

    <script>
        const questions = [
            {id:1, q:"你叫什麽名字？", vn:"Bạn tên gì?", emoji:"👤", template:"我叫 {val}。", opts:["Anna 👧","Kevin 👦","John 👨","Kim 🧑","Nguyen 👤"]},
            {id:2, q:"你是哪國人？", vn:"Bạn là người nước nào?", emoji:"🌍", template:"我是 {val} 人。", opts:["Vietnam 🇻🇳","TQ 🇨🇳","Nhat Ban 🇯🇵","Mỹ 🇺🇸","Anh 🇬🇧"]},
            {id:3, q:"現在幾點？", vn:"Bây giờ mấy giờ?", emoji:"⏰", template:"現在是 {val}。", opts:["10h 🕙","2h30 🕝","5h40 🕠","6h 15 🕡","22h10 🕚"]},
            {id:4, q:"今天星期幾？", vn:"Hôm nay thứ mấy?", emoji:"📅", template:"今天是 {val}。", opts:["Monday 📅","Tuesday 📅","Wednesday 📅","Thursday 📅","Friday 📅","Saturday 📅","Sunday 📅"]},
            {id:5, q:"你想送什麽？", vn:"Bạn muốn tặng gì?", emoji:"🎁", template:"我想送 {val}。", opts:["hoa 🌹","sách 📖","viết ✏️","tiền 💵","quần áo 👕"]},
            {id:6, q:"那是什麽顔色？", vn:"Đó là màu gì?", emoji:"🎨", template:"那是 {val}。", opts:["Red 🔴","White ⚪","Black ⚫","yellow 🟡","blue 🔵"]},
            {id:7, q:"天氣怎麽樣？", vn:"Thời tiết thế nào?", emoji:"🌤️", template:"天氣 {val}。", opts:["mưa 🌧️","tốt ☀️","không tốt ☁️","nóng 🔥","lạnh ❄️"]},
            {id:8, q:"一共多少錢？", vn:"Tổng cộng bao nhiêu tiền?", emoji:"💰", template:"一共 {val} 錢。", opts:["10000 💵","33000 💵","500 💵","6000 💵","3000000 🪙"]}
        ]

        let currentQ = null
        let currentAns = null

        function renderList() {
            const list = document.getElementById('question-list')
            list.innerHTML = ''
            questions.forEach(q => {
                const btn = document.createElement('div')
                btn.className = `aspect-square bg-white rounded-3xl flex flex-col items-center justify-center shadow-md border-4 border-transparent active:scale-95 transition-all cursor-pointer`
                btn.innerHTML = `
                    <div class="text-5xl mb-1">${q.emoji}</div>
                    <div class="text-3xl font-bold text-amber-600">${q.id}</div>
                `
                btn.onclick = () => selectQuestion(q.id)
                list.appendChild(btn)
            })
        }

        function selectQuestion(id) {
            currentQ = questions.find(q => q.id === id)
            randomizeAnswer()
        }

        function randomizeAnswer() {
            if (!currentQ) return
            const randomIndex = Math.floor(Math.random() * currentQ.opts.length)
            currentAns = currentQ.opts[randomIndex]
            
            const [val, em] = currentAns.split(' ')
            const fullAnswer = currentQ.template.replace('{val}', val)

            const html = `
                <div class="text-center">
                    <div class="flex justify-center mb-6">
                        <div class="text-7xl">${currentQ.emoji}</div>
                    </div>
                    
                    <div class="text-3xl font-bold text-gray-800 mb-2">${currentQ.q}</div>
                    <div class="text-lg text-amber-600 mb-10">(${currentQ.vn})</div>

                    <div class="answer-box bg-gradient-to-br from-yellow-50 to-amber-50 rounded-3xl py-10 px-6 border-4 border-yellow-200">
                        <div class="text-amber-500 text-xs font-medium tracking-widest mb-4">📱 ĐÁP ÁN CHO BẠN B</div>
                        
                        <!-- Phần đáp án đã giảm kích thước -->
                        <div class="flex items-center justify-center gap-4 mb-8">
                            <span class="text-6xl">${em}</span>
                            <span class="text-5xl font-black text-gray-900">${val}</span>
                        </div>
                        
                        <div class="bg-white mx-auto max-w-[260px] rounded-2xl py-5 px-6 shadow-inner">
                            <div class="text-emerald-600 text-xs mb-2">💬 Câu trả lời đầy đủ:</div>
                            <div class="text-2xl font-medium text-gray-800 leading-tight">${fullAnswer}</div>
                        </div>
                    </div>

                    <button onclick="randomizeAnswer()" 
                            class="mt-10 w-full bg-gradient-to-r from-orange-400 to-yellow-400 text-white font-bold text-3xl py-7 rounded-3xl shadow-lg flex items-center justify-center gap-4 active:scale-95">
                        🎲 Đáp án mới
                    </button>
                    
                    <p class="mt-6 text-xs text-gray-400">A hỏi → B xem & trả lời → Bấm nút đổi đáp án</p>
                </div>
            `
            document.getElementById('main-content').innerHTML = html
        }

        // Khởi động
        window.onload = () => {
            renderList()
            setTimeout(() => selectQuestion(1), 300)
        }
    </script>
</body>
</html>
