    <style>
        body {

            padding: 20px;

        .container {
            max-width: 900px;

        .lessons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }
        button {
            width: 100%;
            padding: 18px 12px;
            font-size: 20px;
            background: white;
            color: #333;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .mode-btn {
            background: #4ade80;
            color: white;
            font-size: 18px;
            padding: 14px;
        }
        .back-btn {
            background: #f87171;
            color: white;
            margin-top: 20px;
        }
        #quiz-container { display: none; }
        .progress { font-size: 18px; text-align: center; margin-bottom: 20px; }
        .hanzi {
            font-size: 90px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            min-height: 110px;
            line-height: 1.2;
        }
        .pinyin {
            font-size: 28px;
            text-align: center;
            margin: 10px 0;
            opacity: 0.9;
            font-style: italic;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }
        .result {
            font-size: 26px;
            text-align: center;
            margin: 20px 0;
            font-weight: bold;
        }
        .correct { background: #4ade80 !important; color: white !important; }
        .wrong { background: #f87171 !important; color: white !important; }
        .toggle-pinyin {
            background: #60a5fa;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            margin: 15px auto;
            display: block;
        }

        let currentLesson = null;
        let currentMode = null;
        let vocabulary = [];
        let currentIndex = 0;
        let isAnswered = false;
        let showPinyin = false;
        let stageSize = 5;

        function createLessonButtons() {
            const container = document.getElementById('lesson-list');
            container.innerHTML = '';
            Object.keys(allLessons).forEach(lessonNum => {
                const btn = document.createElement('button');
                btn.textContent = `Bài ${lessonNum}`;
                btn.onclick = () => selectLesson(parseInt(lessonNum));
                container.appendChild(btn);
            });
        }

        function selectLesson(lessonNum) {
            currentLesson = lessonNum;
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('mode-screen').style.display = 'block';
            document.getElementById('selected-lesson-title').textContent = `Bài ${lessonNum} - Chọn dạng quiz`;
        }

        function backToMenu() {
            document.getElementById('mode-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'block';
        }

        function startQuiz(mode) {
            currentMode = mode;
            const lessonData = allLessons[currentLesson];
            
            vocabulary = lessonData.normal.map(hanzi => ({
                hanzi: hanzi,
                pinyin: lessonData.items[hanzi].pinyin,
                meaning: lessonData.items[hanzi].meaning
            }));

            if (mode === 'shuffle') {
                vocabulary = vocabulary.sort(() => Math.random() - 0.5);
            }

            currentIndex = 0;
            document.getElementById('mode-screen').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            
            document.getElementById('lesson-num').textContent = currentLesson;
            document.getElementById('total').textContent = vocabulary.length;
            
            loadQuestion();
        }

        function togglePinyin() {
            showPinyin = !showPinyin;
            const pinyinEl = document.getElementById('pinyin');
            pinyinEl.style.display = showPinyin ? 'block' : 'none';
            document.querySelector('.toggle-pinyin').textContent = showPinyin ? '🙈 Ẩn Pinyin' : '👁️ Hiện Pinyin';
        }

        function loadQuestion() {
            isAnswered = false;
            const currentWord = vocabulary[currentIndex];
            
            document.getElementById('current').textContent = currentIndex + 1;
            document.getElementById('hanzi').textContent = currentWord.hanzi;
            document.getElementById('pinyin').textContent = currentWord.pinyin || '';
            document.getElementById('result').textContent = '';
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            let wrongAnswers = vocabulary.filter(w => w.hanzi !== currentWord.hanzi);
            wrongAnswers = wrongAnswers.sort(() => Math.random() - 0.5).slice(0, 3);
            
            let answers = [currentWord.meaning, ...wrongAnswers.map(w => w.meaning)];
            answers = answers.sort(() => Math.random() - 0.5);

            answers.forEach(answer => {
                const btn = document.createElement('button');
                btn.textContent = answer;
                btn.onclick = () => checkAnswer(answer, currentWord.meaning, btn);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct, button) {
            if (isAnswered) return;
            isAnswered = true;

            const buttons = document.querySelectorAll('#options button');
            buttons.forEach(btn => {
                if (btn.textContent === correct) btn.classList.add('correct');
                else if (btn.textContent === selected && selected !== correct) btn.classList.add('wrong');
                btn.disabled = true;
            });

            const resultDiv = document.getElementById('result');
            if (selected === correct) {
                resultDiv.textContent = "✓ Đúng rồi!";
                resultDiv.style.color = "#4ade80";
                setTimeout(() => {
                    currentIndex++;
                    if (currentIndex < vocabulary.length) loadQuestion();
                    else finishQuiz();
                }, 1200);
            } else {
                resultDiv.textContent = "✕ Sai rồi! Quay lại đầu chặng.";
                resultDiv.style.color = "#f87171";
                const currentStageStart = Math.floor(currentIndex / stageSize) * stageSize;
                currentIndex = currentStageStart;
                setTimeout(() => loadQuestion(), 1800);
            }
        }

        function finishQuiz() {
            document.getElementById('hanzi').innerHTML = `
                <div style="font-size: 60px;">🎉 Hoàn thành!</div>
                <div style="font-size: 28px; margin-top: 20px;">Bạn đã học xong Bài ${currentLesson}</div>
            `;
            document.getElementById('options').innerHTML = `
                <button onclick="restartCurrentQuiz()" style="width:100%; padding:25px; font-size:24px; background:#4ade80; color:white;">
                    Chơi lại bài này
                </button>
            `;
        }

        function restartCurrentQuiz() {
            currentIndex = 0;
            if (currentMode === 'shuffle') vocabulary.sort(() => Math.random() - 0.5);
            loadQuestion();
        }

        function exitQuiz() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'block';
        }

        window.onload = () => {
            createLessonButtons();
        };
    </script>
